---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
      url: https://host.docker.internal:9443/mutate--v1-service
      caBundle: 
  failurePolicy: Fail
  name: host.docker.internal
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - services
  sideEffects: NoneOnDryRun
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - cert-manager
          - kube-node-lease
          - kube-public
          - kube-system
          - kubemacpool-system
          - kubelet-serving-cert-approver
          - kubevirt
          - eventus
          - fluent
          - kyverno
          - metallb-system
          - monitoring
          - rook-ceph
          - falco
          - trivy-system
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  name: host.docker.internal
  clientConfig:
      url: https://host.docker.internal:9443/validate--v1-service
      caBundle: 
  failurePolicy: Fail
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - services
  sideEffects: None
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - cert-manager
          - kube-node-lease
          - kube-public
          - kube-system
          - kubemacpool-system
          - kubelet-serving-cert-approver
          - kubevirt
          - eventus
          - fluent
          - kyverno
          - metallb-system
          - monitoring
          - rook-ceph
          - falco
          - trivy-system          
